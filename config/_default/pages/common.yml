# 默认页面配置（请勿直接修改）。
# 建议复制到 config/user/pages/common.yml 并按需调整。
title: 常用网站 # 页面标题
subtitle: Common website # 页面副标题

# 指定使用的内置页面类型（由 Astro 组件渲染）
# 说明：推荐使用通用页面类型 page；首页由“导航第一项”决定
template: page

# 页面分类与站点列表
categories:
  - name: 置顶
    icon: fas fa-star # 分类图标
    sites:
      - name: 汇通主页 # 站点名称
        url: https://www.hutnis.com/ # http/https URL（favicon 模式将尝试加载站点图标）
        icon: fab fa-linux # 手动图标：manual 模式使用；favicon 模式下作为回退
        description: 汇通主页 # 站点描述
      - name: 汇通服务展示
        url: https://web.hutnis.com/
        icon: fas fa-star
        description: 汇通服务展示
        faviconUrl: assets/menav.svg
      - name: OA
        url: https://oa.hutnis.com:23456/
        icon: fab fa-google
        description: 汇通OA
      - name: VPN
        url: https://hutnis.hutnis.com:14433/
        icon: fab fa-google
        description: 汇通VPN
  - name: 内网
    icon: fas fa-graduation-cap
    sites:
      - name: OA
        url: https://oa.hutnis.com:23456
        icon: fas fa-play-circle
        description: 汇通OA
      - name: 网盘
        url: https://pan.hutnis.com:8443/
        icon: fas fa-book
        description: 汇通网盘
      - name: PDF工具
        url: http://pdf.hutnis.com/
        icon: fas fa-code
        description: 汇通PDF工具

